services:
  - type: web
    name: whatsapp-ia
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node .next/standalone/server.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: PORT
        value: "10000"
      - key: HOSTNAME
        value: "0.0.0.0"
