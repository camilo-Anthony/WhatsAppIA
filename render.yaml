services:
  - type: web
    name: whatsapp-ia
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
